name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Dev / todo PR: feedback rápido (sin QA pesado) ──────────────────────
  fast-feedback:
    name: Fast feedback (lint + unit tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ktlint check
        run: ./gradlew ktlintCheck --no-daemon

      - name: Unit tests (domain + data)
        run: ./gradlew :domain:test :data:test --no-daemon

  # ── Solo PR → main o push a main: QA completo ───────────────────────────
  qa-gate:
    name: QA gate (main)
    runs-on: ubuntu-latest
    needs: fast-feedback
    if: ${{ github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Detekt (análisis estático)
        run: ./gradlew detekt --no-daemon

      - name: Unit tests (app)
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Test coverage report (domain)
        run: ./gradlew :domain:jacocoTestReport --no-daemon

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: domain-coverage
          path: domain/build/reports/jacoco/test/html/
          retention-days: 7

      - name: Android Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
